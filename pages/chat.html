<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chat</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: url("../images/endoback.jpeg") no-repeat center center fixed;
      background-size: cover;
    }

    .container {
      width: 600px;
      margin: 50px auto;
      background: linear-gradient(to bottom, #ffffff, #fff0f5);
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      height: 80vh;
      display: flex;
      flex-direction: column;
    }

    h2 {
      text-align: center;
      color: #E381B5;
    }

    /* CHAT AREA */
    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      margin-bottom: 10px;
    }

    .message {
      background: white;
      padding: 10px;
      border-radius: 12px;
      margin-bottom: 10px;
      max-width: 70%;
    }

    .me {
      background: #E381B5;
      color: white;
      margin-left: auto;
    }

    /* INPUT AREA */
    .input-area {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    button {
      background: linear-gradient(45deg, #E381B5, #f5a3c7);
      border: none;
      color: white;
      padding: 10px 15px;
      border-radius: 10px;
      cursor: pointer;
    }

    /* SCROLLBAR */
    .chat-box::-webkit-scrollbar {
      width: 6px;
    }

    .chat-box::-webkit-scrollbar-thumb {
      background: #E381B5;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>?? Community Chat</h2>

  <div id="chatBox" class="chat-box"></div>

  <div class="input-area">
    <input id="messageInput" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import ENV from "../config.js";
const firebaseConfig = {
  apiKey: ENV.FIREBASE_API_KEY,
  authDomain: ENV.FIREBASE_AUTH_DOMAIN,
  projectId: ENV.FIREBASE_PROJECT_ID,
  storageBucket: ENV.FIREBASE_STORAGE_BUCKET,
  messagingSenderId: ENV.FIREBASE_MESSAGING_ID,
  appId: ENV.FIREBASE_APP_ID
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// SEND MESSAGE
window.sendMessage = async function() {

  const input = document.getElementById("messageInput");
  const text = input.value;

  if (!text) return;

  await addDoc(collection(db, "messages"), {
    text: text,
    createdAt: new Date(),
    user: "Anonymous" // later we can connect auth
  });

  input.value = "";

  loadMessages();
};

// LOAD MESSAGES
async function loadMessages() {

  const q = query(collection(db, "messages"), orderBy("createdAt"));
  const snapshot = await getDocs(q);

  let html = "";

  snapshot.forEach(doc => {

    const msg = doc.data();

    html += `
      <div class="message">
        <b>${msg.user}</b><br>
        ${msg.text}
      </div>
    `;
  });

  const chatBox = document.getElementById("chatBox");
  chatBox.innerHTML = html;

  // AUTO SCROLL DOWN
  chatBox.scrollTop = chatBox.scrollHeight;
}

// AUTO LOAD
loadMessages();

// OPTIONAL AUTO REFRESH EVERY 2s
setInterval(loadMessages, 2000);

</script>

</body>
</html>
