<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>EndoCycle Login</title>
</head>
<style>
  input::placeholder {
    color: #e381b5;
    opacity: 1;
  }
</style>

<body style="
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: url('images/endoback.jpeg') no-repeat center center fixed;
  background-size: cover;
">

  <!-- 🌸 OVERLAY (makes text readable) -->
  <div style="
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(252, 239, 246, 0.085);
    z-index:-1;
  "></div>

  <!-- 🌸 LOGO -->
  <div style="text-align:center;">
    <img src="images/endologo-removebg-preview.png" style="width:700px;">
  </div>

  <!-- 🌸 LOGIN BOX -->
  <div style="
      width:320px;
      margin:40px auto;
      padding:60px;
      background: linear-gradient(to bottom, #ffffff, #fff0f5); backdrop-filter: blur(10px);
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
      text-align:center;
      position: relative;
      top: -200px;
      right: 0px;
  ">

    <h2 style="color:#ffd6e0;">Welcome </h2>

    <input type="email" id="email" placeholder="Email"
      style="width:100%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #e381b5; outline:none; color: #e381b5;">

    <div style="position:relative; width:100%;">

      <input type="password" id="password" placeholder="Password"
        style="width:100%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #e381b5; outline:none; color: #e381b5;">

      <img id="toggleIcon" src="images/show.png" onclick="togglePassword()" style="position:absolute; right:12px; top:50%; transform:translateY(-50%);
    width:22px; height:22px; cursor:pointer;">

    </div>

    <button onclick="signup()"
      style="width:108%; padding:12px; margin-top:10px; background:#cba6f7; border:none; border-radius:10px; font-weight:bold; cursor:pointer; color: #ffffff;">
      Sign Up
    </button>

    <button onclick="login()"
      style="width:108%; padding:12px; margin-top:10px; background:#a0e7e5; border:none; border-radius:10px; font-weight:bold; cursor:pointer; color: #ffffff;">
      Login
    </button>

    <button onclick="googleLogin()"
      style="width:108%; padding:12px; margin-top:10px; background:#ffd6e0; border:none; border-radius:10px; font-weight:bold; cursor:pointer; color: #ffffff;">
      Sign in with Google
    </button>

  </div>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { customAlert } from "./js/ui.js";

    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      GoogleAuthProvider,
      signInWithPopup
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    import ENV from "./config.js";
    const firebaseConfig = {
      apiKey: ENV.FIREBASE_API_KEY,
      authDomain: ENV.FIREBASE_AUTH_DOMAIN,
      projectId: ENV.FIREBASE_PROJECT_ID,
      storageBucket: ENV.FIREBASE_STORAGE_BUCKET,
      messagingSenderId: ENV.FIREBASE_MESSAGING_ID,
      appId: ENV.FIREBASE_APP_ID
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.signup = function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      createUserWithEmailAndPassword(auth, email, password)
        .then(() => {
          window.location.href = "pages/home.html";
        })
        .catch((error) => {
          if (error.code === 'auth/email-already-in-use') {
            customAlert("This email is already registered. Please log in.");
          } else if (error.code === 'auth/weak-password') {
            customAlert("Password should be at least 6 characters.");
          } else {
            customAlert("Sign up error: " + error.message);
          }
        });
    }

    window.login = function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      signInWithEmailAndPassword(auth, email, password)
        .then(() => window.location.href = "pages/home.html")
        .catch((error) => {
          if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
            customAlert("Invalid email or password. Please try again or Sign Up first.");
          } else {
            customAlert("Login error: " + error.message);
          }
        });
    }

    window.googleLogin = function () {
      const provider = new GoogleAuthProvider();

      signInWithPopup(auth, provider)
        .then(() => window.location.href = "pages/home.html")
        .catch((error) => customAlert(error.message));
    }

    window.togglePassword = function () {
      var password = document.getElementById("password");
      var icon = document.getElementById("toggleIcon");

      if (password.type === "password") {
        password.type = "text";
        icon.src = "images/hide.png";
      } else {
        password.type = "password";
        icon.src = "images/show.png";
      }
    }
  </script>

</body>

</html>
